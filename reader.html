    <a class="rd-back-portal" href="index.html">

<!-- 阅读器 -->
<div class="reader-view" id="readerView"></div>

<!-- 学习模式视图（视听/任务/图谱） -->
<div class="mode-view" id="modeView"></div>

<!-- 教材详情弹层 -->
<div class="bd-overlay" id="bdOverlay">
  <div class="bd-panel" id="bdPanel"></div>

<div class="modal-mask" id="payMask">
  <div class="pay-modal" id="payModal"></div>

<script src="assets/app.js?v=20260711h"></script>
<script>
/* ================= 数据 ================= */
const BOOKS = [
  {t:'法医损伤学（第2版）', a:'闵建雄', cv:'cv-6', sub:'刑事科学技术', level:'技工', cat:'专业基础课', price:29.90, tag:'配套视频', hot:1},
  {t:'催眠破案实录', a:'侯森林 · 周用武', cv:'cv-8', sub:'侦查心理学', level:'技工', cat:'专业基础课', price:59.90, tag:'名师课堂', hot:1},
  {t:'笔迹识人——笔迹分析与运用', a:'王圣江', cv:'cv-10', light:1, sub:'文件检验', level:'中职', cat:'专业基础课', price:60.00, hot:1},
  {t:'文书物证司法鉴定理论与实务', a:'贾晓光', cv:'cv-3', sub:'司法鉴定', level:'高职专科', cat:'专业核心课', price:59.90},
  {t:'野生动物识别与鉴定', a:'闵建雄', cv:'cv-7', sub:'动物检验', level:'高职专科', cat:'专业基础课', price:79.90, tag:'配套视频', hot:1},
  {t:'指纹：历史、法则与传奇', a:'乔治·威尔顿', cv:'cv-4', sub:'痕迹检验', level:'本科', cat:'理论图书', price:68.00, tag:'本周新书', hot:1},
  {t:'公安机关办理刑事案件程序规定释义与实务指南', a:'李本森 等', cv:'cv-12', sub:'执法规范', level:'高职专科', cat:'专业核心课', price:18.00},
  {t:'刑事简易程序规范化改革实证研究', a:'孙茂利', cv:'cv-1', sub:'司法改革', level:'研究生', cat:'理论图书', price:49.90},
  {t:'公安行政调解（第二版）', a:'付立忠', cv:'cv-9', sub:'行政执法', level:'中职', cat:'实训实习课', price:21.90},
  {t:'公安机关刑事执法程序一本通', a:'贾晓光', cv:'cv-2', sub:'执法实务', level:'技工', cat:'实训实习课', price:23.50},
  {t:'食药侦部门管辖的36种刑事案件立案追诉标准', a:'余定猛 · 丁正国', cv:'cv-11', sub:'案件办理', level:'高职本科', cat:'专业核心课', price:66.00},
  {t:'从有效辩护到成功辩护', a:'何群 · 周林', cv:'cv-5', sub:'律师实务', level:'本科', cat:'升学辅导', price:81.90, tag:'配套视频', hot:1},
  {t:'智能组织：数据与AI重塑的组织管理', a:'侯森林 · 周用武 · 徐照宇', cv:'cv-1', sub:'管理类', level:'本科', cat:'公共基础课', price:59.90, hot:1},
  {t:'Excel数据管理与数据透视', a:'张晓莉 · 薛伟强', cv:'cv-2', sub:'数据分析', level:'中职', cat:'公共基础课', price:49.90, hot:1},
  {t:'学会提问，驾驭AI：提示词从入门到精通', a:'贺敏华', cv:'cv-3', sub:'人工智能', level:'技工', cat:'公共基础课', price:45.00},
  {t:'浪潮之巅（第四版 · 全二册）', a:'周用武 · 徐照宇', cv:'cv-9', sub:'科技史', level:'本科', cat:'理论图书', price:88.00},
];
const MY_BOOKS = [
  {i:0, pr:62, last:'第四章 机械性损伤（二）'},
  {i:4, pr:35, last:'第二章 兽类动物识别'},
  {i:13, pr:88, last:'第六章 数据透视表进阶'},
  {i:5, pr:12, last:'第一章 指纹学的起源'},
];
const LEVELS = ['全部','技工','中职','高职专科','高职本科','本科','研究生'];
const CATS = ['全部','公共基础课','专业基础课','专业核心课','专业拓展课','实训实习课','升学辅导','理论图书'];
let fLevel='全部', fCat='全部', curView='mall';

/* ================= 工具 ================= */
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function coverHtml(b) {
  return `<div class="cover ${b.cv}${b.light?' light':''}">
    <div><div class="c-sub" style="font-size:8px;">${esc(b.sub)}</div><div class="c-title" style="font-size:13px;">${esc(b.t.length>12?b.t.slice(0,12)+'…':b.t)}</div></div>
    <div class="c-foot" style="font-size:7px;">职教云链 · 数字出版</div>
  </div>`;
}

/* 简介与目录（演示数据，后续由后台录入） */
const DESCS = {
  '法医损伤学（第2版）':'系统阐述法医损伤学的基础理论与鉴定实务，覆盖机械性损伤、致伤物推断与损伤程度评定，配套高清案例图谱、章节自测与授课课件。',
  '催眠破案实录':'以真实案例解析催眠技术在侦查实务中的应用边界与操作规范，配套名师课堂视频与情景演练模块。',
  '笔迹识人——笔迹分析与运用':'从笔迹形态特征入手，讲解笔迹分析的科学方法与司法运用场景，附大量真迹样本对照练习。',
  '野生动物识别与鉴定':'图鉴式呈现常见野生动物物种识别要点与执法鉴定规范，含高清标本图库与识别测验。',
  '指纹：历史、法则与传奇':'从指纹学的起源讲起，系统梳理指纹识别的科学法则与经典案例，配套高清图谱与交互式比对练习。',
  'Excel数据管理与数据透视':'围绕数据清洗、函数进阶与数据透视表，以真实业务数据为练手场景，随书提供全部案例文件与操作微课。',
};
function descFor(b){ return DESCS[b.t] || `本教材围绕${b.sub}领域的核心知识与岗位技能编写，理论与实务并重，配套图文、音视频与互动素材，支持阅读与授课双模式，适用于${b.level}层次相关专业教学。`; }
function tocFor(b){
  return [
    `第一章 绪论：走进${b.sub}`,
    `第二章 ${b.sub}的基本概念与规范`,
    `第三章 核心方法与操作流程`,
    `第四章 典型场景与案例解析（上）`,
    `第五章 典型场景与案例解析（下）`,
    `第六章 综合实训与岗位衔接`,
    `第七章 拓展阅读与前沿动态`,
  ];
}

/* 购买状态：会话内持久化 */
const purchased = new Set(JSON.parse(localStorage.getItem('zjyl_purchased') || '[]'));
function isOwned(i){ return purchased.has(i) || MY_BOOKS.some(m => m.i === i); }
function myList(){
  const extra = [...purchased].filter(i => !MY_BOOKS.some(m => m.i === i)).map(i => ({i, pr:0, last:'尚未开始学习'}));
  return [...extra, ...MY_BOOKS];
}

/* ================= 商城视图 ================= */
function cardHtml(b, i) {
  const owned = isOwned(i);
  return `<article class="rd-card" onclick="openDetail(${i})">
    ${coverHtml(b)}
    <div class="n">${esc(b.t)}</div>
    <div class="a">${esc(b.a)}</div>
    <div class="f">
      ${owned ? '<span style="font-size:12.5px;font-weight:700;color:var(--teal-deep);">已购买</span>' : `<span class="price"><span class="yen">¥</span>${b.price.toFixed(2)}</span>`}
      <span class="go">立即阅读
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
    </div>
  </article>`;
}

function pills(list, cur, setter) {
  return list.map(v => `<span class="filter-opt ${v===cur?'active':''}" onclick="${setter}('${v}')">${esc(v)}</span>`).join('');
}

function renderMall() {
  const q = (document.getElementById('rdSearch')?.value || '').trim();
  let items = BOOKS.map((b, i) => ({b, i}));
  if (fLevel!=='全部') items = items.filter(({b}) => b.level===fLevel);
  if (fCat!=='全部') items = items.filter(({b}) => b.cat===fCat);
  if (q) items = items.filter(({b}) => b.t.includes(q) || b.a.includes(q) || b.sub.includes(q));
  document.getElementById('rd-mall').innerHTML = `
    <div class="rd-filters">
      <div class="filter-row">
        <span class="filter-label">学历层次</span>
        <div class="filter-opts">${pills(LEVELS, fLevel, 'setLevel')}</div>
      </div>
      <div class="filter-row">
        <span class="filter-label">图书分类</span>
        <div class="filter-opts">${pills(CATS, fCat, 'setCat')}</div>
      </div>
    </div>
    <div class="rd-sec-head">
      <div class="t"><span class="bar"></span>教材资源</div>
      <span style="font-size:13px;color:var(--ink-3);">共 <strong style="color:var(--blue);">${items.length}</strong> 本</span>
    </div>
    ${items.length
      ? `<div class="rd-grid">${items.map(({b, i}) => cardHtml(b, i)).join('')}</div>`
      : `<div style="text-align:center;padding:64px 0;color:var(--ink-3);">
           <p style="font-size:16px;font-weight:700;color:var(--ink-2);">未找到匹配教材</p>
           <p style="font-size:13px;margin-top:6px;">请尝试调整筛选条件或搜索关键词</p>
         </div>`}`;
}

function renderMy() {
  const list = myList();
  const lr = getLastRead();
  document.getElementById('rd-my').innerHTML = `
    <div class="rd-sec-head">
      <div class="t"><span class="bar"></span>我的教材</div>
      <span style="font-size:13px;color:var(--ink-3);">共 ${list.length} 本 · 按最近学习排序</span>
    </div>
    <div class="rd-my-grid">
      ${list.map(m => {
        const b = BOOKS[m.i];
        const st = lr[m.i];
        const toc = tocFor(b);
        const pr = st ? Math.round(((st.ch+1)/toc.length)*100) : m.pr;
        const last = st ? toc[st.ch] : m.last;
        return `<article class="rd-my-card" onclick="openDetail(${m.i})">
          ${coverHtml(b)}
          <div class="rd-my-body">
            <div class="n">${esc(b.t)}</div>
            <div class="a">${esc(b.a)}</div>
            <div class="rd-progress">
              <div class="row"><span>上次学到：${esc(last)}</span><strong>${pr}%</strong></div>
              <div class="track"><div class="fill" style="width:${pr}%;"></div></div>
            </div>
            <div class="rd-my-actions">
              <button class="btn-mini" type="button" onclick="event.stopPropagation();openReader(${m.i})">继续阅读
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </button>
              <button class="btn-mini ghost" type="button" onclick="event.stopPropagation();openTeach(${m.i})">授课模式</button>
            </div>
          </div>
        </article>`;
      }).join('')}
    </div>

    <div class="rd-sec-head" style="margin-top:40px;">
      <div class="t"><span class="bar"></span>我的组群</div>
      <div class="grp-actions">
        <button class="grp-btn grp-btn-ghost" onclick="openJoinGroup()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
          加入组群
        </button>
        <button class="grp-btn grp-btn-primary" onclick="openCreateGroup()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          创建组群
        </button>
      </div>
    </div>
    ${GROUPS.length ? `<div class="grp-grid">
      ${GROUPS.map((g, gi) => `<article class="grp-card" onclick="openGroupDetail(${gi})">
        <div class="g-head">
          <span class="g-ic">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <div>
            <div class="g-name">${esc(g.name)}</div>
            <span class="grp-role ${g.admin?'admin':'member'}">${g.admin?'管理员':'成员'}</span>
          </div>
        </div>
        <div class="g-meta"><span><strong>${g.members}</strong> 位成员</span><span><strong>${g.books.length}</strong> 本教材</span></div>
        <div class="g-code">邀请码 <code>${esc(g.code)}</code></div>
      </article>`).join('')}
    </div>`
    : `<div class="grp-empty">还没有组群 · 创建组群后可用邀请码邀请同学加入，共享组群书架</div>`}`;
}

/* ================= 设置（参考 smart-reader） ================= */
function getProfile(){ return Object.assign({nickname:'书海漫游者', phone:'13800138000', school:''}, JSON.parse(localStorage.getItem('zjyl_profile')||'{}')); }
function saveProfile(patch){ localStorage.setItem('zjyl_profile', JSON.stringify(Object.assign(getProfile(), patch))); syncUserChip(); }
function maskPhone(p){ return p ? p.replace(/^(\d{3})\d{4}(\d{4})$/, '$1****$2') : ''; }
function syncUserChip(){
  const u = getProfile();
  document.querySelector('.rd-user .name').textContent = u.nickname;
  document.querySelector('.rd-user .avatar').textContent = u.nickname.slice(0,1);
}

function renderSettings() {
  const u = getProfile();
  const schoolRow = u.school
    ? `<div class="settings-school-row"><span class="val">${esc(u.school)} <span style="font-size:11.5px;color:var(--teal-deep);font-weight:700;margin-left:6px;">已绑定</span></span>
       <span style="display:flex;gap:8px;">
         <button class="btn-settings ghost" onclick="openSchoolModal()">更换学校</button>
         <button class="btn-settings ghost" style="color:#E1543F;border-color:rgba(225,84,63,.35);" onclick="saveProfile({school:''});renderSettings();showToast('已解除学校绑定')">解除绑定</button>
       </span></div>`
    : `<div class="settings-school-row"><span class="muted">未绑定学校</span>
       <button class="btn-settings primary" onclick="openSchoolModal()">绑定学校</button></div>`;
  document.getElementById('rd-settings').innerHTML = `
    <div class="settings-wrap">
      <div class="settings-card">
        <h2>个人信息</h2>
        <div class="settings-profile">
          <div class="settings-av-col">
            <div class="settings-avatar">${esc(u.nickname.slice(0,1))}</div>
            <span class="link" onclick="showToast('演示环境暂不支持上传头像')">更换头像</span>
            <span class="hint">支持 JPG、PNG，小于 2MB</span>

function getLastRead(){ return JSON.parse(localStorage.getItem('zjyl_lastread') || '{}'); }
function setLastRead(i, ch){ const lr = getLastRead(); lr[i] = {ch}; localStorage.setItem('zjyl_lastread', JSON.stringify(lr)); }
let rdBook = -1, rdCh = 0;

function openReader(i, ch) {
  rdBook = i;
  const owned = isOwned(i);
  const lr = getLastRead();
  rdCh = (typeof ch === 'number') ? ch : (lr[i] ? lr[i].ch : 0);
  if (!owned && rdCh > 1) rdCh = 0;
  closeDetail();
  renderReader();
  document.getElementById('readerView').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReader() {
  document.getElementById('readerView').classList.remove('open');
  document.body.style.overflow = '';
  renderMy();
}
function gotoCh(n) {
  const b = BOOKS[rdBook], toc = tocFor(b), owned = isOwned(rdBook);
  if (n < 0 || n >= toc.length) return;
  if (!owned && n > 1) { showToast('试读仅限前两章，购买后解锁全部内容'); return; }
  rdCh = n;
  if (owned) setLastRead(rdBook, n);
  renderReader();
  document.querySelector('.reader-content')?.scrollTo(0, 0);
}
function readerParas(b, ch) {

    <figure class="reader-figure">
      <div class="ph">【示意图占位】${esc(t)} · 配图与音视频素材由后台上传</div>

      </div>
    </div>
    <div class="reader-body">
      <aside class="reader-toc">
        <div class="rt-label">目录</div>
        ${tocHtml}
      </aside>
      <div class="reader-content" data-bg="${rdPrefs.bg}">

/* 每本书可用模式（后台配置；默认 阅读+视听+任务） */
function bookModes(i){
  const b = BOOKS[i];
  return b.modes || (b.hot ? ['read','av','task','kg'] : ['read','av','task']);
}
function openMode(key, i){
  if (key === 'read') { openReader(i); return; }
  if (key === 'teach') { openTeach(i); return; }
  closeDetail();
  renderModeView(key, i);
  document.getElementById('modeView').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModeView(){
  document.getElementById('modeView').classList.remove('open');
  document.body.style.overflow = '';
}
let avEp = 0, mvKey = '', mvBook = -1;
function mvSetEp(n){ avEp = n; renderModeView('av', mvBook); }
function renderModeView(key, i){
  mvKey = key; mvBook = i;
  const b = BOOKS[i], toc = tocFor(b), m = MODE_DEFS[key];
  let content = '';
  if (key === 'av') {
    const eps = toc.map((t, n) => ({t, dur: (8 + (n*7)%9) + ':' + String(15 + (n*13)%40).padStart(2,'0')}));
    content = `<div class="av-layout">
      <div>
        <div class="av-player">
          <button class="play-big" onclick="showToast('视频资源由后台上传，演示环境暂无片源')">

        </div>
      </div>

        <div class="avl-head">微课列表 · 共 ${eps.length} 讲</div>

          <span class="ep-ic">${n===avEp
            ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5-11-6.5z"/></svg>'

          <span>${esc(e.t)}</span>
          <span class="ep-dur">${e.dur}</span>

      </div>
    </div>`;
  } else if (key === 'task') {
    content = `<div class="task-grid">
      ${toc.map((t, n) => {

        return `<div class="task-card">
          <div class="tk-head"><span class="tk-no">${String(n+1).padStart(2,'0')}</span><span class="tk-title">${esc(t)} · 章节练习</span></div>
          <div class="tk-meta"><span>${8 + (n*3)%7} 道题</span><span>预计 ${10 + (n*5)%15} 分钟</span><span>自动批改</span></div>
          <div class="tk-foot">
            <span class="tk-status ${done?'done':'todo'}">${done ? '已完成 · 正确率 ' + (85 + n*5) + '%' : '未开始'}</span>
            <button class="btn-mini" onclick="showToast('在线答题功能开发中，敬请期待')">${done?'查看报告':'进入答题'}
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if (key === 'kg') {
    const cx = 480, cy = 300;
    const nodes = toc.map((t, n) => {
      const ang = (Math.PI * 2 / toc.length) * n - Math.PI / 2;
      return {x: cx + Math.cos(ang) * 205, y: cy + Math.sin(ang) * 165, t: t.replace(/^第.章\s*/, '').slice(0, 9), ang};
    });
    const subs = nodes.flatMap((nd, n) => [0, 1].map(k => {
      const a = nd.ang + (k ? .34 : -.34);
      return {x: cx + Math.cos(a) * 300, y: cy + Math.sin(a) * 240, t: ['概念', '规范', '案例', '实训', '考点', '方法'][(n + k * 3) % 6], px: nd.x, py: nd.y};
    }));
    content = `<div class="kg-canvas">
      <svg viewBox="0 0 960 600">
        ${nodes.map(nd => `<line x1="${cx}" y1="${cy}" x2="${nd.x}" y2="${nd.y}" stroke="#C7D2FE" stroke-width="1.5"/>`).join('')}
        ${subs.map(sd => `<line x1="${sd.px}" y1="${sd.py}" x2="${sd.x}" y2="${sd.y}" stroke="#E4E9F4" stroke-width="1.2" stroke-dasharray="3 4"/>`).join('')}
        ${subs.map(sd => `<g><circle cx="${sd.x}" cy="${sd.y}" r="17" fill="#F5F7FC" stroke="#E4E9F4"/><text x="${sd.x}" y="${sd.y+4}" text-anchor="middle" font-size="10" fill="#7A86A5">${sd.t}</text></g>`).join('')}

        <circle cx="${cx}" cy="${cy}" r="52" fill="url(#kgGrad)"/>
        <defs><linearGradient id="kgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2160F3"/><stop offset="1" stop-color="#00C29A"/></linearGradient></defs>
        <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">${esc(b.t.slice(0,6))}</text>
        <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.8)">${toc.length} 章 · ${toc.length*2} 个知识点</text>
      </svg>
      <div class="kg-legend">
        <span><i style="background:linear-gradient(135deg,#2160F3,#00C29A)"></i>教材</span>
        <span><i style="background:#EAF0FE;border:1.5px solid #2160F3"></i>章节</span>
        <span><i style="background:#F5F7FC;border:1px solid #E4E9F4"></i>知识点</span>
      </div>
    </div>`;
  }
  document.getElementById('modeView').innerHTML = `
    <div class="reader-top">
      <button class="reader-back" onclick="closeModeView()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
        返回

      <span class="rt-title">${esc(b.t)}</span>

      </div>
    </div>
    <div class="mv-body"><div class="mv-wrap">${content}</div></div>`;
}

/* ================= 授课模式 ================= */
let tcBook = -1, tcSlide = 0;
function teachSlides(b) {
  const toc = tocFor(b);
  return [
    {t: b.t, pts: ['主讲：' + b.a, '适用层次：' + b.level + ' · ' + b.cat, '本课程配套数字教材，支持课堂互动与随堂练习']},
    ...toc.map(ch => ({t: ch, pts: [
      '核心概念与术语体系梳理',
      b.sub + '领域的典型工作场景解析',
      '操作要点、规范流程与常见误区',
      '章末自测与岗位技能点对照',
    ]})),
  ];
}
function openTeach(i) {
  tcBook = i; tcSlide = 0;
  closeDetail();
  renderTeach();
  document.getElementById('teachView').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeTeach() {
  document.getElementById('teachView').classList.remove('open');
  document.body.style.overflow = '';
}
function teachGo(n) {
  const slides = teachSlides(BOOKS[tcBook]);
  if (n < 0 || n >= slides.length) return;
  tcSlide = n; renderTeach();
}
function renderTeach() {
  const b = BOOKS[tcBook];
  const slides = teachSlides(b);
  const s0 = slides[tcSlide];
  document.getElementById('teachView').innerHTML = `
    <div class="teach-top">
      <span class="t-name">${esc(b.t)}</span>
      <span class="t-mode">授课模式</span>
      <button class="teach-exit" onclick="closeTeach()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
        退出授课
      </button>
    </div>
    <div class="teach-stage">
      <div class="teach-slide">
        <div class="kicker"><span class="ln"></span>${tcSlide===0 ? '课程封面' : '第 ' + tcSlide + ' 讲'}</div>
        <h2>${esc(s0.t)}</h2>
        <ul>${s0.pts.map(pt => `<li><span class="dot"></span><span>${esc(pt)}</span></li>`).join('')}</ul>
      </div>
    </div>
    <div class="teach-foot">
      <button class="teach-nav" onclick="teachGo(${tcSlide-1})" ${tcSlide===0?'disabled':''}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 6-6 6 6 6"/></svg>
      </button>
      <span class="teach-page">${tcSlide+1} / ${slides.length}</span>
      <button class="teach-nav" onclick="teachGo(${tcSlide+1})" ${tcSlide===slides.length-1?'disabled':''}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
      </button>
    </div>`;
}
document.addEventListener('keydown', e => {
  if (document.getElementById('teachView').classList.contains('open')) {
    if (e.key === 'ArrowRight') teachGo(tcSlide+1);
    if (e.key === 'ArrowLeft') teachGo(tcSlide-1);
    if (e.key === 'Escape') closeTeach();
  }
});

function switchBdTab(t) { bdTab = t; renderDetail(); }

  }).join('');
  const actions = owned
    ? `<span class="owned-badge">

      <button class="bd-tab ${bdTab==='intro'?'active':''}" onclick="switchBdTab('intro')">简介</button>
      <button class="bd-tab ${bdTab==='toc'?'active':''}" onclick="switchBdTab('toc')">目录</button>

    <div class="bd-content">
      ${bdTab==='intro'
        ? `<div class="bd-desc">
             <p>${esc(descFor(b))}</p>
             <div class="facts">
               <div><span class="k">书号</span><span>ISBN 978-7-81139-841-0</span></div>
               <div><span class="k">出版方</span><span>职教云链 · 数字出版</span></div>

}

/* ================= 支付 ================= */
let payIdx = -1, payMethod = 'wx';
function openPay(i) {
  payIdx = i; payMethod = 'wx';
  renderPay();
  document.getElementById('payMask').classList.add('open');
}
function closePay() { document.getElementById('payMask').classList.remove('open'); }
function setPayMethod(m) { payMethod = m; renderPay(); }
function renderPay() {
  const b = BOOKS[payIdx];
  const mk = (key, cls, label, icon) => `
    <div class="pay-method ${payMethod===key?'active':''}" onclick="setPayMethod('${key}')">
      <span class="pm-ic ${cls}">${icon}</span>${label}
      <span class="check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-10"/></svg></span>
    </div>`;
  document.getElementById('payModal').innerHTML = `
    <button class="modal-close" onclick="closePay()" aria-label="关闭">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
    <h3>确认订单</h3>
    <div class="pay-order">
      ${coverHtml(b)}
      <div class="info">
        <div class="t">${esc(b.t)}</div>
        <div class="a">${esc(b.a)} · 数字教材</div>
        <div class="price"><span class="yen">¥</span>${b.price.toFixed(2)}</div>
      </div>
    </div>
    <div class="pay-methods">
      ${mk('wx','pm-wx','微信支付','<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.7 4C5 4 2 6.6 2 9.8c0 1.8 1 3.4 2.5 4.5l-.6 1.9 2.2-1.1c.8.2 1.5.4 2.4.4h.4a5 5 0 0 1-.2-1.5c0-3 2.9-5.5 6.5-5.5h.4C14.9 6 12.1 4 8.7 4zm-2.2 3a.9.9 0 1 1 0 1.8.9.9 0 0 1 0-1.8zm4.7 0a.9.9 0 1 1 0 1.8.9.9 0 0 1 0-1.8zM15.3 10c-3.1 0-5.6 2.1-5.6 4.7 0 2.6 2.5 4.7 5.6 4.7.6 0 1.3-.1 1.9-.3l1.9.9-.5-1.6c1.4-.9 2.4-2.2 2.4-3.7 0-2.6-2.5-4.7-5.7-4.7zm-2 2.6a.8.8 0 1 1 0 1.5.8.8 0 0 1 0-1.5zm4 0a.8.8 0 1 1 0 1.5.8.8 0 0 1 0-1.5z"/></svg>')}
      ${mk('ali','pm-ali','支付宝','<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 15.1c-1.7-.6-3.9-1.4-6.3-2.1.8-1.4 1.4-3 1.8-4.6h-4.3V6.9h5.3V6h-5.3V3.6h-2.4V6H5v.9h5.2v1.5H5.9v.9h8.6a13 13 0 0 1-1.3 3.2c-2.2-.7-4.5-1.2-6.2-1.2-3.5 0-4.5 1.9-4.5 3.5 0 2 1.7 3.6 4.4 3.6 2.6 0 4.9-1.3 6.8-3.4 2.3.9 4.6 2 6.7 2.9l1-2.4zM6.6 17c-1.4 0-2.4-.7-2.4-1.8 0-1 .8-1.9 2.6-1.9 1.4 0 3.1.5 4.9 1.2-1.5 1.6-3.3 2.5-5.1 2.5z"/></svg>')}
    </div>
    <button class="pay-submit" id="paySubmit" onclick="doPay()">确认支付 ¥${b.price.toFixed(2)}</button>
    <p class="pay-hint">演示环境：不产生真实扣款 · 正式环境接入平台统一支付并留档对账</p>`;

function doPay() {
  const btn = document.getElementById('paySubmit');
  btn.disabled = true;
  btn.textContent = '支付处理中…';
  setTimeout(() => {
    purchased.add(payIdx);
    localStorage.setItem('zjyl_purchased', JSON.stringify([...purchased]));
    const b = BOOKS[payIdx];
    document.getElementById('payModal').innerHTML = `
      <div class="pay-success">
        <div class="ic">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4.5 12.5 5 5 10-11"/></svg>
        </div>
        <div class="t1">支付成功</div>
        <div class="t2">《${esc(b.t)}》已加入「我的教材」，可立即开始学习</div>
        <div class="btn-row">
          <button class="bd-btn bd-btn-teach" onclick="closePay()">继续逛逛</button>
          <button class="bd-btn bd-btn-read" onclick="closePay();closeDetail();go('my')">去我的教材</button>
        </div>
      </div>`;
    renderMall(); renderMy(); renderDetail();
  }, 1100);
}

/* ================= 教材兑换 ================= */
const REDEEM_CODES = {
  'ZJYL-AI-2026': 14,
  'ZJYL-EXCEL-2026': 13,
  'ZJYL-FORENSIC-2026': 0,
};
function openRedeem() {
  openGrpModal(`<div class="grp-head"><h2>兑换教材</h2><button class="modal-close" onclick="closeGrpModal()" aria-label="关闭">×</button></div>
    <div style="padding:4px 2px 2px;">
      <p style="font-size:13px;color:var(--ink-3);line-height:1.7;margin-bottom:18px;">输入兑换码后，教材将自动加入「我的教材」。</p>
      <label style="display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:8px;">教材兑换码</label>
      <input id="redeemCode" class="redeem-input" placeholder="例如：ZJYL-AI-2026" autocomplete="off" autocapitalize="characters" onkeydown="if(event.key==='Enter')doRedeem()">
      <button class="btn-login" style="width:100%;margin-top:18px;letter-spacing:2px;" onclick="doRedeem()">确认兑换</button>
      <div style="margin-top:16px;padding:11px 12px;border-radius:9px;background:var(--blue-soft);font-size:11px;color:var(--ink-2);line-height:1.7;">演示兑换码：<b style="color:var(--blue);">ZJYL-AI-2026</b>、<b style="color:var(--blue);">ZJYL-EXCEL-2026</b></div>
    </div>`);
  setTimeout(() => document.getElementById('redeemCode')?.focus(), 100);
}
function doRedeem() {
  const input = document.getElementById('redeemCode');
  const code = input?.value.trim().toUpperCase();
  if (!code) { showToast('请输入教材兑换码'); input?.focus(); return; }
  const bookIndex = REDEEM_CODES[code];
  if (bookIndex === undefined) { showToast('兑换码无效或已过期，请核对后重试'); return; }
  if (isOwned(bookIndex)) { showToast('这本教材已在你的书架中'); closeGrpModal(); return; }
  purchased.add(bookIndex);
  localStorage.setItem('zjyl_purchased', JSON.stringify([...purchased]));
  closeGrpModal(); renderMall(); renderMy();
  showToast(`兑换成功：《${BOOKS[bookIndex].t}》已加入我的教材`);
}
document.getElementById('payMask').addEventListener('click', e => { if (e.target === e.currentTarget) closePay(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('teachView').classList.contains('open')) { closePay(); closeDetail(); closeGrpModal(); }
});

/* ================= 切换 ================= */
const VIEW_META = {
  mall: ['教材商城', '发现、选购全部上架数字教材'],
  my:   ['我的教材', '已购教材、学习进度与组群'],
  settings: ['设置', '账号与偏好'],
};
function go(view) {
  curView = view;
  document.querySelectorAll('.rd-nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  document.querySelectorAll('.rd-page').forEach(p => p.classList.toggle('active', p.id === 'rd-' + view));
  document.getElementById('rdTitle').textContent = VIEW_META[view][0];
  document.getElementById('rdHint').textContent = VIEW_META[view][1];
  window.scrollTo(0, 0);
}
function setLevel(v){ fLevel=v; renderMall(); }
function setCat(v){ fCat=v; renderMall(); }

document.querySelectorAll('.rd-nav-item').forEach(n => n.addEventListener('click', () => go(n.dataset.view)));
document.getElementById('rdSearch').addEventListener('input', () => { if (curView!=='mall') go('mall'); renderMall(); });
document.getElementById('rdRedeem').addEventListener('click', openRedeem);

renderMall(); renderMy(); renderSettings(); syncUserChip();
go('mall');
if (location.hash === '#my') go('my');
const readerParams = new URLSearchParams(location.search);
const detailBook = Number(readerParams.get('book'));
if (readerParams.get('view') !== 'mall' && Number.isInteger(detailBook) && BOOKS[detailBook]) openDetail(detailBook);
</script>
